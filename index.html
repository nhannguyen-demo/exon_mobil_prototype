<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akselos Dashboard</title>
    <style>
        /* 1. Remove all default spacing and scrollbars from the web page */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevents scrollbars from appearing */
            background-color: #000000;
            /* You can change this to match your prototype's background color */
        }

        /* 2. Force the iframe to take up the absolute full screen */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            /* Removes the thin gray border */
        }
    </style>
</head>

<body>

    <iframe
        src="https://embed.figma.com/proto/2Io2S2okp0vQtbwEcmJ07j/Akselos_Layout?node-id=1094-221&scaling=contain&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=516%3A42&embed-host=share&hide-ui=1"
        allowfullscreen>
    </iframe>

</body>

</html>
