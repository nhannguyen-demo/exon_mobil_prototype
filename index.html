<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akselos Dashboard</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f6f8;
            /* Matches the light background of your UI */
        }

        /* This CSS forces the iframe to completely cover the screen without 
           triggering Figma's internal black bars. 
        */
        iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            /* Forces a strict 16:9 aspect ratio */
            width: 100vw;
            height: 56.25vw;
            /* (9 / 16) * 100 */

            /* Ensures it never shrinks smaller than the screen */
            min-height: 100vh;
            min-width: 177.77vh;
            /* (16 / 9) * 100 */

            border: none;
        }
    </style>
</head>

<body>

    <iframe
        src="https://embed.figma.com/proto/2Io2S2okp0vQtbwEcmJ07j/Akselos_Layout?node-id=1094-221&scaling=contain&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=516%3A42&embed-host=share&hide-ui=1"
        allowfullscreen>
    </iframe>

</body>

</html>
